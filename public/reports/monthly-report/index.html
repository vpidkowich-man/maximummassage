<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Monthly Report · Maximum Massage Therapy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script data-cfasync="false" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script data-cfasync="false" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script data-cfasync="false" src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script data-cfasync="false" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script data-cfasync="false" src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F4EF; font-family: 'DM Sans', sans-serif; }
  button { cursor: pointer; border: none; outline: none; font-family: inherit; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 8px 10px; font-size: 12px; }

  .rail {
    position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
    padding: 28px 16px 24px 20px; background: transparent;
    overflow-y: auto; z-index: 20;
  }
  .rail-inner {
    background: rgba(255, 255, 255, 0.55); backdrop-filter: blur(8px);
    border: 1px solid #E8E1D6; border-radius: 14px;
    padding: 22px 18px; box-shadow: 0 4px 24px rgba(45, 82, 66, 0.08);
  }
  .rail-brand {
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700;
    color: #1A1A1A; line-height: 1.15; margin-bottom: 4px;
  }
  .rail-brand-sub {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #B8913F; font-weight: 700; margin-bottom: 26px;
  }
  .rail-section { margin-bottom: 22px; }
  .rail-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: #B8913F; margin-bottom: 10px;
  }
  .rail-btn {
    display: block; width: 100%; text-align: left; padding: 7px 12px;
    border-radius: 18px; font-size: 12px; font-weight: 600;
    margin-bottom: 3px; background: transparent; color: #6B6459;
    transition: all 0.12s;
  }
  .rail-btn:hover { background: #F7F4EF; color: #1A1A1A; }
  .rail-btn-active { background: #2D5242; color: #FFFFFF; }
  .rail-btn-active:hover { background: #2D5242; color: #FFFFFF; }
  .rail-window {
    display: flex; align-items: center; gap: 8px; margin-top: 4px;
  }
  .rail-window-label { font-size: 11px; color: #1A1A1A; font-weight: 600; flex: 1; text-align: center; }
  .rail-prior { font-size: 10px; color: #6B6459; margin-top: 6px; line-height: 1.4; }

  .report-content { margin-left: 240px; padding: 40px 28px; }
  .report-content-inner { max-width: 920px; margin: 0 auto; }

  .date-input {
    display: block; width: 100%; padding: 7px 10px; margin-bottom: 8px;
    border-radius: 8px; border: 1px solid #E8E1D6; background: #FFFFFF;
    font-family: inherit; font-size: 12px; color: #1A1A1A; cursor: pointer;
  }
  .date-input:focus { outline: none; border-color: #2D5242; }
  .date-label { font-size: 10px; font-weight: 600; color: #6B6459; margin-bottom: 3px; }

  .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill {
    padding: 5px 11px; border-radius: 16px; font-size: 11px; font-weight: 600;
    border: 1px solid transparent; background: #EDE9E3; color: #6B6459;
    transition: all 0.12s;
  }
  .pill:hover { background: #E0DACE; color: #1A1A1A; }
  .pill-active { background: #2D5242; color: #FFFFFF; border-color: #2D5242; }
  .pill-active:hover { background: #2D5242; color: #FFFFFF; }

  .chart-title { font-size: 20px; font-weight: 700; color: #1A1A1A; font-family: 'Cormorant Garamond', serif; }
  .chart-subtitle { font-size: 12px; color: #6B6459; margin-top: 4px; line-height: 1.5; }

  @media (max-width: 900px) {
    .rail {
      position: static; width: auto; height: auto;
      padding: 12px 16px; overflow-y: visible;
    }
    .rail-inner { padding: 14px 16px; }
    .rail-brand { display: inline-block; margin-right: 16px; }
    .rail-brand-sub { display: inline-block; margin-bottom: 10px; }
    .rail-section { margin-bottom: 14px; }
    .rail-btn { display: inline-block; width: auto; margin-right: 4px; }
    .report-content { margin-left: 0; padding: 20px 16px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-cfasync="false">
const { useState, useEffect, useMemo } = React;
const {
  BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
  Legend, ResponsiveContainer, LabelList
} = Recharts;

const C = {
  bg: "#F7F4EF", card: "#FFFFFF",
  green: "#2D5242", greenLight: "#3D6B56", greenPale: "#EAF0EC",
  gold: "#B8913F", goldLight: "#F0E4C6",
  empty: "#D9CFC3", text: "#1A1A1A", muted: "#6B6459",
  accent: "#C4653A", cancelled: "#C4653A",
};

const MONTH_LABELS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const SNAPSHOT_LABELS = { "1mo": "Last month", "4mo": "Last 4 months", "12mo": "Last 12 months" };
const monthLabel = (ym) => {
  const [y, m] = ym.split("-").map(Number);
  return `${MONTH_LABELS[m-1]} '${String(y).slice(2)}`;
};
const shiftYear = (ym, delta) => {
  const [y, m] = ym.split("-").map(Number);
  return `${y + delta}-${String(m).padStart(2, "0")}`;
};
const fmtMoney = (v) => {
  if (v == null) return "—";
  if (Math.abs(v) >= 1000) return `$${(v/1000).toFixed(1)}k`;
  return `$${v}`;
};
const fmtNum = (v) => v == null ? "—" : v.toLocaleString();
const pct = (cur, prior) => {
  if (prior == null || prior === 0) return null;
  return ((cur - prior) / prior) * 100;
};

// --- KPI card with YoY delta ---
const KPI = ({ label, value, delta, accent, hint }) => {
  const isUp = delta != null && delta >= 0;
  const deltaColor = delta == null ? C.muted : (isUp ? C.green : C.accent);
  return (
    <div style={{ background:C.card, borderRadius:14, padding:"22px 18px", flex:1, minWidth:160, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid rgba(0,0,0,0.06)", borderTop:`3px solid ${accent||C.green}` }}>
      <div style={{ fontSize:11, fontWeight:700, color:C.text, letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:10 }}>{label}</div>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:32, fontWeight:700, color:accent||C.green, lineHeight:1, marginBottom:8 }}>{value}</div>
      <div style={{ fontSize:12, color:deltaColor, fontWeight:600 }}>
        {delta == null ? "No prior-year data" : `${isUp ? "▲" : "▼"} ${Math.abs(delta).toFixed(1)}% vs. prior year`}
      </div>
      {hint && <div style={{ fontSize:11, color:C.muted, marginTop:6, lineHeight:1.5 }}>{hint}</div>}
    </div>
  );
};

// --- Stacked bar tooltip (monthly: completed + cancelled) ---
const StackTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  const get = k => payload.find(p => p.dataKey === k)?.value ?? 0;
  return (
    <div style={{ background:C.green, color:"#fff", borderRadius:10, padding:"12px 16px", fontSize:12, boxShadow:"0 4px 20px rgba(0,0,0,0.25)", minWidth:180 }}>
      <div style={{ fontWeight:700, marginBottom:8 }}>{label}</div>
      {[["completed","#a8d4bc","✓ Completed"],["cancelled","#e8b499","✗ Cancelled"]].map(([k,col,lbl]) => (
        <div key={k} style={{ display:"flex", justifyContent:"space-between", gap:16, marginBottom:3 }}>
          <span style={{ color:col }}>{lbl}</span>
          <span style={{ fontWeight:700 }}>{fmtNum(get(k))}</span>
        </div>
      ))}
    </div>
  );
};

// --- Utilization bucket tooltip (per-therapist: completed% + cancelled% + idle% + raw hours) ---
const UtilTooltip = ({ active, payload }) => {
  if (!active || !payload?.length) return null;
  const p = payload[0]?.payload;
  if (!p) return null;
  return (
    <div style={{ background:C.green, color:"#fff", borderRadius:10, padding:"12px 16px", fontSize:12, boxShadow:"0 4px 20px rgba(0,0,0,0.25)", minWidth:220 }}>
      <div style={{ fontWeight:700, marginBottom:8 }}>{p.fullName || p.name}</div>
      <div style={{ display:"flex", justifyContent:"space-between", gap:16, marginBottom:3 }}>
        <span style={{ color:"#a8d4bc" }}>✓ Completed</span>
        <span style={{ fontWeight:700 }}>{p.completedPct}% · {p.completedHours?.toFixed(0)}h</span>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", gap:16, marginBottom:3 }}>
        <span style={{ color:"#e8b499" }}>✗ Cancelled</span>
        <span style={{ fontWeight:700 }}>{p.cancelledPct}% · {p.cancelledHours?.toFixed(0)}h</span>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", gap:16, marginBottom:3 }}>
        <span style={{ color:"#c8bfb5" }}>○ Idle</span>
        <span style={{ fontWeight:700 }}>{p.idlePct}% · {p.idleHours?.toFixed(0)}h</span>
      </div>
      <div style={{ fontSize:11, color:"#c8bfb5", marginTop:6, paddingTop:6, borderTop:"1px solid rgba(255,255,255,0.15)" }}>
        {p.shiftHours?.toFixed(0)}h scheduled capacity
      </div>
    </div>
  );
};

// --- Line tooltip (current vs prior year) ---
const LineTooltip = ({ active, payload, label, formatter }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:C.green, color:"#fff", borderRadius:10, padding:"10px 14px", fontSize:12, boxShadow:"0 4px 20px rgba(0,0,0,0.2)" }}>
      <div style={{ fontWeight:700, marginBottom:6 }}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{ display:"flex", justifyContent:"space-between", gap:14, marginBottom:2 }}>
          <span style={{ color:p.color, fontWeight:600 }}>{p.name}</span>
          <span>{formatter ? formatter(p.value) : p.value}</span>
        </div>
      ))}
    </div>
  );
};

// --- Main app ---
function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [segmentKey, setSegmentKey] = useState(null);
  const [dateStart, setDateStart] = useState(null); // YYYY-MM-DD
  const [dateEnd, setDateEnd]     = useState(null); // YYYY-MM-DD
  const [snapshotKey, setSnapshotKey] = useState("12mo");
  const [activePractitioners, setActivePractitioners] = useState(null); // Set<string> of practitioners in util chart

  useEffect(() => {
    fetch("./data.json", { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => {
        setData(d);
        const firstSeg = Object.keys(d.segments || {})[0];
        if (firstSeg) setSegmentKey(firstSeg);
        // Default date window: last 6 months ending on the latest data date.
        if (d.lastDataDate) {
          const end = d.lastDataDate;
          const [y, m] = end.split("-").map(Number);
          let sy = y, sm = m - 5;
          while (sm < 1) { sm += 12; sy -= 1; }
          const start = `${sy}-${String(sm).padStart(2,"0")}-01`;
          setDateStart(start);
          setDateEnd(end);
        } else if (d.dataThrough) {
          const end = `${d.dataThrough}-28`;
          setDateEnd(end);
          setDateStart(`${shiftYear(d.dataThrough, 0).split("-")[0]}-01-01`);
        }
        // Utilization chart: default to focus practitioners selected.
        const focus = d.practitioners?.focus || [];
        setActivePractitioners(new Set(focus));
      })
      .catch(e => setError(e.message));
  }, []);

  if (error) return <EmptyState message={`Could not load data.json (${error}). Run the monthly ingestion script to generate it.`} />;
  if (!data) return <LoadingState />;
  if (!data.segments || Object.keys(data.segments).length === 0) return <EmptyState message="No segments in data.json. Check the ingestion script output." />;

  const segment = data.segments[segmentKey];
  if (!segment) return <LoadingState />;

  // Filter daily data to picked date range, roll up to monthly for charts/tables
  const { windowMonths, priorMonths, windowRows, priorRows } = buildRange(segment.daily, dateStart, dateEnd);

  // Aggregate KPIs
  const sum = (rows, k) => rows.reduce((s, r) => s + (r?.[k] || 0), 0);
  const kpis = {
    revenue:   { cur: sum(windowRows, "revenue"),    prior: priorRows.length ? sum(priorRows, "revenue")    : null },
    completed: { cur: sum(windowRows, "completed"),  prior: priorRows.length ? sum(priorRows, "completed")  : null },
    cancelled: { cur: sum(windowRows, "cancelled"),  prior: priorRows.length ? sum(priorRows, "cancelled")  : null },
  };
  const booked = sum(windowRows, "booked");
  const cancRate = booked > 0 ? (kpis.cancelled.cur / booked) * 100 : null;

  // Chart data: one row per month in window, with current + prior values
  const stackChart = windowMonths.map((m, i) => ({
    name: monthLabel(m),
    completed: windowRows[i]?.completed || 0,
    cancelled: windowRows[i]?.cancelled || 0,
  }));

  // --- Schedule Utilization bucket chart (3-layer: completed + cancelled + idle) ---
  // Uses `practitionerUtilization` at the data root (all detected practitioners) and a
  // pill selector to toggle bars in/out. Defaults to focus practitioners.
  const allPractitioners = Object.keys(data.practitionerUtilization || {}).sort();
  const activeSet = activePractitioners || new Set(data.practitioners?.focus || []);
  const snapshotAvailable = ["1mo", "4mo", "12mo"].filter(k => {
    return allPractitioners.some(n => data.practitionerUtilization[n]?.[k]);
  });

  const utilChartData = allPractitioners.filter(n => activeSet.has(n)).map(name => {
    const snap = data.practitionerUtilization?.[name]?.[snapshotKey];
    if (!snap || !snap.shiftHours) return null;
    const completedPct = Math.round((snap.completedHours / snap.shiftHours) * 100);
    const cancelledPct = Math.round((snap.cancelledHours / snap.shiftHours) * 100);
    const idlePct = Math.max(0, 100 - completedPct - cancelledPct);
    return {
      name: name.split(" ")[0],
      fullName: name,
      completedPct,
      cancelledPct,
      idlePct,
      shiftHours: snap.shiftHours,
      completedHours: snap.completedHours,
      cancelledHours: snap.cancelledHours,
      idleHours: snap.idleHours,
    };
  }).filter(Boolean);

  // --- Section 1: clinic-wide "real cost of empty hours" KPIs ---
  // Uses the 12mo utilization window (fixed) for a stable headline summary, regardless
  // of the user's date range. Lost revenue = (idle + cancelled hrs) × avg $/hr.
  const clinic12 = data.segments?.["whole-clinic"]?.snapshot?.["12mo"];
  const massage12 = data.segments?.["all-massage"]?.snapshot?.["12mo"];
  const avgRate = (massage12 && massage12.completedHours > 0)
    ? (() => {
        // Derive massage $/hr from actual revenue / completed hours over the last 12 months.
        const range = data.snapshotRanges?.["12mo"];
        const days = (data.segments["all-massage"].daily || []).filter(d =>
          range ? d.date >= range.start && d.date <= range.end : true
        );
        const rev = days.reduce((s, d) => s + (d.revenue || 0), 0);
        return rev > 0 && massage12.completedHours > 0 ? rev / massage12.completedHours : 124;
      })()
    : 124;
  const section1 = clinic12 ? {
    lostRevPerMonth: Math.round(((clinic12.idleHours + clinic12.cancelledHours) * avgRate) / 12),
    emptyHoursPerMonth: Math.round(clinic12.idleHours / 12),
    avgRate: Math.round(avgRate),
  } : null;
  // Lowest fill-rate practitioner (focus or massage), using completedHours / shiftHours
  const candidates = (data.practitioners?.focus || []);
  let lowestFillRate = null;
  for (const name of candidates) {
    const snap = data.practitionerUtilization?.[name]?.["12mo"];
    if (!snap || !snap.shiftHours) continue;
    const rate = snap.completedHours / snap.shiftHours;
    if (lowestFillRate == null || rate < lowestFillRate.rate) {
      lowestFillRate = { name, rate, firstName: name.split(" ")[0] };
    }
  }

  // YoY line charts (revenue, bookings, cancellations) — current solid, prior dashed gold
  const revChart = windowMonths.map((m, i) => ({
    name: monthLabel(m),
    current: windowRows[i]?.revenue || 0,
    prior:   priorRows[i]?.revenue ?? null,
  }));
  const bkChart = windowMonths.map((m, i) => ({
    name: monthLabel(m),
    current: windowRows[i]?.completed || 0,
    prior:   priorRows[i]?.completed ?? null,
  }));
  const cancChart = windowMonths.map((m, i) => ({
    name: monthLabel(m),
    current: windowRows[i]?.cancelled || 0,
    prior:   priorRows[i]?.cancelled ?? null,
  }));

  const togglePractitioner = (name) => {
    const next = new Set(activeSet);
    if (next.has(name)) next.delete(name); else next.add(name);
    setActivePractitioners(next);
  };

  // Date inputs are bounded by the full range of available daily data.
  const allDates = (segment.daily || []).map(d => d.date);
  const minDate = allDates[0];
  const maxDate = allDates[allDates.length - 1];

  return (
    <div style={{ background:C.bg, minHeight:"100vh" }}>

      {/* LEFT RAIL — floating card: segment selector + date range picker */}
      <nav className="rail">
        <div className="rail-inner">
          <div className="rail-brand">Monthly Report</div>
          <div className="rail-brand-sub">Maximum Massage</div>

          <div className="rail-section">
            <div className="rail-label">View</div>
            {Object.entries(data.segments).map(([k, s]) => (
              <button
                key={k}
                onClick={() => setSegmentKey(k)}
                className={`rail-btn${segmentKey===k ? " rail-btn-active" : ""}`}
              >
                {s.label || k}
              </button>
            ))}
          </div>

          <div className="rail-section">
            <div className="rail-label">Date range</div>
            <div className="date-label">Start</div>
            <input
              type="date"
              className="date-input"
              value={dateStart || ""}
              min={minDate}
              max={dateEnd || maxDate}
              onChange={e => setDateStart(e.target.value)}
            />
            <div className="date-label">End</div>
            <input
              type="date"
              className="date-input"
              value={dateEnd || ""}
              min={dateStart || minDate}
              max={maxDate}
              onChange={e => setDateEnd(e.target.value)}
            />
            <div className="rail-prior">
              Current: {fmtDate(dateStart)} – {fmtDate(dateEnd)}<br/>
              vs. {dateStart && dateEnd ? `${fmtDate(shiftDateYear(dateStart, -1))} – ${fmtDate(shiftDateYear(dateEnd, -1))}` : "no prior-year data"}
            </div>
          </div>
        </div>
      </nav>

      <main className="report-content">
        <div className="report-content-inner">

        {/* HEADER */}
        <div style={{ marginBottom:28, borderLeft:`4px solid ${C.green}`, paddingLeft:20 }}>
          <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:C.gold, marginBottom:10 }}>Monthly Report</div>
          <h1 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:36, fontWeight:700, color:C.text, lineHeight:1.2, margin:"0 0 12px" }}>
            Revenue, Bookings & Cancellations
          </h1>
          <p style={{ fontSize:13, color:C.muted, maxWidth:560, lineHeight:1.7, margin:0 }}>
            Data through <strong style={{ color:C.text }}>{data.dataThrough ? monthLabel(data.dataThrough) : "—"}</strong>
            {data.updatedAt && <> · Updated {new Date(data.updatedAt).toLocaleDateString()}</>}
          </p>
        </div>

        {/* SECTION 1 — The real cost of empty hours (clinic-wide, last 12 months) */}
        {section1 && (
          <Card
            title="The real cost of empty hours"
            subtitle={`Clinic-wide, last 12 months — at the massage program's realized rate of ~$${section1.avgRate}/hr`}
          >
            <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
              <KPI
                label="Lost revenue / month"
                value={`$${section1.lostRevPerMonth.toLocaleString()}`}
                delta={null}
                accent={C.accent}
                hint="Hours available but unfilled or cancelled × avg $/hr"
              />
              <KPI
                label="Empty hours / month"
                value={`${section1.emptyHoursPerMonth}h`}
                delta={null}
                accent={C.gold}
                hint="Scheduled capacity never booked (clinic-wide average)"
              />
              {lowestFillRate && (
                <KPI
                  label={`${lowestFillRate.firstName}'s fill rate`}
                  value={`${Math.round(lowestFillRate.rate * 100)}%`}
                  delta={null}
                  accent={C.green}
                  hint={`Lowest of the focus therapists — biggest upside if filled`}
                />
              )}
            </div>
          </Card>
        )}

        {/* KPI ROW — reflects selected date range */}
        <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:28 }}>
          <KPI label="Revenue"        value={fmtMoney(kpis.revenue.cur)}   delta={pct(kpis.revenue.cur,   kpis.revenue.prior)}   accent={C.green} hint={`${fmtDate(dateStart)} – ${fmtDate(dateEnd)}`} />
          <KPI label="Bookings"       value={fmtNum(kpis.completed.cur)}   delta={pct(kpis.completed.cur, kpis.completed.prior)} accent={C.greenLight} hint="Completed = booked − cancelled" />
          <KPI label="Cancellations"  value={fmtNum(kpis.cancelled.cur)}   delta={pct(kpis.cancelled.cur, kpis.cancelled.prior)} accent={C.accent}     hint={cancRate != null ? `${cancRate.toFixed(1)}% cancellation rate` : null} />
        </div>

        {/* STACKED BAR: monthly bookings (completed + cancelled) */}
        <Card title="Monthly Bookings" subtitle="Completed vs. cancelled by month — cancellations sit on top so the lost portion is visible">
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={stackChart} margin={{ top:10, right:10, left:-10, bottom:0 }} barSize={44}>
              <CartesianGrid strokeDasharray="3 3" stroke="#EDE9E3" vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize:12, fontWeight:600, fill:C.text }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize:11, fill:C.muted }} axisLine={false} tickLine={false} />
              <Tooltip content={<StackTooltip />} cursor={{ fill:"rgba(0,0,0,0.03)" }} />
              <Bar dataKey="completed" stackId="a" fill={C.green}     name="Booked & Completed" />
              <Bar dataKey="cancelled" stackId="a" fill={C.cancelled} name="Booked but Cancelled" radius={[6,6,0,0]} />
            </BarChart>
          </ResponsiveContainer>
          <Legend2Layer />
        </Card>

        {/* SCHEDULE UTILIZATION — three-layer bucket per therapist; toggle any practitioner on/off */}
        {allPractitioners.length > 0 && (
          <Card
            title="Schedule Utilization by Therapist"
            subtitle="Completed, cancelled, and idle as % of scheduled capacity. Toggle any practitioner in the clinic on or off."

            <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
              {["1mo","4mo","12mo"].filter(k => snapshotAvailable.includes(k)).map(k => (

                  background: snapshotKey===k ? C.green : "#EDE9E3",
                  color: snapshotKey===k ? "#fff" : C.muted,
                }}>{SNAPSHOT_LABELS[k]}</button>
              ))}
            </div>

            {/* Practitioner pill selector */}
            <div className="pill-row">
              {allPractitioners.map(n => {

                const short = n.split(" ")[0];
                return (
                  <button
                    key={n}
                    className={`pill${active ? " pill-active" : ""}`}
                    onClick={() => togglePractitioner(n)}
                    title={n}
                  >
                    {active ? "✓ " : "+ "}{short}

              })}
            </div>

            {utilChartData.length > 0 ? (
              <>
                <ResponsiveContainer width="100%" height={280}>
                  <BarChart data={utilChartData} margin={{ top:14, right:10, left:-15, bottom:0 }} barSize={52}>

                    <XAxis dataKey="name" tick={{ fontSize:13, fontWeight:600, fill:C.text }} axisLine={false} tickLine={false} />
                    <YAxis tickFormatter={v => `${v}%`} tick={{ fontSize:11, fill:C.muted }} domain={[0,100]} axisLine={false} tickLine={false} />
                    <Tooltip content={<UtilTooltip />} cursor={{ fill:"rgba(0,0,0,0.03)" }} />
                    <Bar dataKey="completedPct" stackId="u" fill={C.green} name="Completed">
                      <LabelList dataKey="completedPct" position="center" formatter={v => v > 6 ? `${v}%` : ""} style={{ fill:"#fff", fontSize:11, fontWeight:700 }} />
                    </Bar>
                    <Bar dataKey="cancelledPct" stackId="u" fill={C.cancelled} name="Cancelled">
                      <LabelList dataKey="cancelledPct" position="center" formatter={v => v > 4 ? `${v}%` : ""} style={{ fill:"#fff", fontSize:10, fontWeight:700 }} />
                    </Bar>
                    <Bar dataKey="idlePct" stackId="u" fill={C.empty} name="Idle" radius={[6,6,0,0]}>
                      <LabelList dataKey="idlePct" position="top" formatter={v => v > 5 ? `${v}% idle` : ""} style={{ fill:C.muted, fontSize:11, fontWeight:700 }} />
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
                <div style={{ display:"flex", gap:16, marginTop:10, justifyContent:"center", flexWrap:"wrap" }}>
                  {[[C.green,"Completed"],[C.cancelled,"Cancelled"],[C.empty,"Idle capacity"]].map(([col,lbl]) => (
                    <div key={lbl} style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ width:10, height:10, borderRadius:2, background:col }} />
                      <span style={{ fontSize:11, color:C.muted }}>{lbl}</span>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <div style={{ fontSize:12, color:C.muted, padding:"24px 0", textAlign:"center" }}>
                Select at least one practitioner above to show their utilization.
              </div>
            )}
          </Card>
        )}

        {/* REVENUE YoY */}
        <Card title="Revenue — year over year" subtitle="Monthly revenue for the selected window, with prior-year overlay">
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={revChart} margin={{ top:10, right:20, left:-5, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#EDE9E3" vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize:12, fontWeight:600, fill:C.text }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize:11, fill:C.muted }} tickFormatter={fmtMoney} axisLine={false} tickLine={false} />
              <Tooltip content={<LineTooltip formatter={fmtMoney} />} />
              <Line type="monotone" dataKey="current" stroke={C.green} strokeWidth={3} dot={{ r:4 }} name="Current" />
              <Line type="monotone" dataKey="prior"   stroke={C.gold}  strokeWidth={2} dot={{ r:3 }} strokeDasharray="5 4" name="Prior year" connectNulls={false} />
            </LineChart>
          </ResponsiveContainer>
        </Card>

        {/* BOOKINGS YoY */}
        <Card title="Bookings — year over year" subtitle="Completed bookings per month (cancellations excluded), with prior-year overlay">
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={bkChart} margin={{ top:10, right:20, left:-5, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#EDE9E3" vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize:12, fontWeight:600, fill:C.text }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize:11, fill:C.muted }} axisLine={false} tickLine={false} />
              <Tooltip content={<LineTooltip formatter={fmtNum} />} />
              <Line type="monotone" dataKey="current" stroke={C.greenLight} strokeWidth={3} dot={{ r:4 }} name="Current" />
              <Line type="monotone" dataKey="prior"   stroke={C.gold}       strokeWidth={2} dot={{ r:3 }} strokeDasharray="5 4" name="Prior year" connectNulls={false} />
            </LineChart>
          </ResponsiveContainer>
        </Card>

        {/* CANCELLATIONS YoY */}
        <Card title="Cancellations — year over year" subtitle="Cancelled bookings per month, with prior-year overlay">
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={cancChart} margin={{ top:10, right:20, left:-5, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#EDE9E3" vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize:12, fontWeight:600, fill:C.text }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize:11, fill:C.muted }} axisLine={false} tickLine={false} />
              <Tooltip content={<LineTooltip formatter={fmtNum} />} />
              <Line type="monotone" dataKey="current" stroke={C.accent} strokeWidth={3} dot={{ r:4 }} name="Current" />
              <Line type="monotone" dataKey="prior"   stroke={C.gold}   strokeWidth={2} dot={{ r:3 }} strokeDasharray="5 4" name="Prior year" connectNulls={false} />
            </LineChart>
          </ResponsiveContainer>
        </Card>

        {/* MONTHLY TABLE */}
        <Card title="Monthly Breakdown" subtitle="Current 6 months vs. prior year — each row">
          <div style={{ overflowX:"auto" }}>
            <table>
              <thead>
                <tr style={{ borderBottom:`2px solid ${C.greenPale}`, color:C.muted, fontWeight:700, textTransform:"uppercase", fontSize:10, letterSpacing:"0.06em" }}>
                  <th>Month</th>
                  <th style={{ textAlign:"right" }}>Revenue</th>
                  <th style={{ textAlign:"right" }}>YoY</th>
                  <th style={{ textAlign:"right" }}>Bookings</th>
                  <th style={{ textAlign:"right" }}>YoY</th>
                  <th style={{ textAlign:"right" }}>Cancelled</th>
                  <th style={{ textAlign:"right" }}>Rate</th>
                </tr>
              </thead>
              <tbody>
                {windowMonths.map((m, i) => {
                  const cur = windowRows[i] || {};
                  const prior = priorRows[i] || null;
                  const revDelta = pct(cur.revenue,   prior?.revenue);
                  const bkDelta  = pct(cur.completed, prior?.completed);
                  const rate = cur.booked ? (cur.cancelled / cur.booked) * 100 : null;
                  return (
                    <tr key={m} style={{ borderBottom:"1px solid #EDE9E3" }}>
                      <td style={{ fontWeight:600, color:C.text }}>{monthLabel(m)}</td>
                      <td style={{ textAlign:"right" }}>{fmtMoney(cur.revenue)}</td>
                      <td style={{ textAlign:"right", color: revDelta == null ? C.muted : (revDelta >= 0 ? C.green : C.accent), fontWeight:600 }}>{revDelta == null ? "—" : `${revDelta >= 0 ? "+" : ""}${revDelta.toFixed(1)}%`}</td>
                      <td style={{ textAlign:"right" }}>{fmtNum(cur.completed)}</td>
                      <td style={{ textAlign:"right", color: bkDelta == null ? C.muted : (bkDelta >= 0 ? C.green : C.accent), fontWeight:600 }}>{bkDelta == null ? "—" : `${bkDelta >= 0 ? "+" : ""}${bkDelta.toFixed(1)}%`}</td>
                      <td style={{ textAlign:"right" }}>{fmtNum(cur.cancelled)}</td>
                      <td style={{ textAlign:"right", color:C.muted }}>{rate == null ? "—" : `${rate.toFixed(1)}%`}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>

        </div>
      </main>
    </div>
  );
}

// --- Helpers ---

// Filter daily rows to [dateStart, dateEnd] inclusive; also returns prior-year equivalents
// (both endpoints shifted back 1 year) and monthly roll-ups for charts/table.
function buildRange(daily, dateStart, dateEnd) {
  const empty = { windowMonths:[], priorMonths:[], windowRows:[], priorRows:[], currentDaily:[], priorDaily:[] };
  if (!daily || !daily.length || !dateStart || !dateEnd) return empty;

  const inRange = (d, s, e) => d >= s && d <= e;
  const currentDaily = daily.filter(d => inRange(d.date, dateStart, dateEnd));

  const priorStart = shiftDateYear(dateStart, -1);
  const priorEnd   = shiftDateYear(dateEnd,   -1);
  const priorDaily = daily.filter(d => inRange(d.date, priorStart, priorEnd));

  const aggToMonths = (rows) => {
    const byMonth = {};
    for (const r of rows) {
      const month = r.date.slice(0, 7);
      byMonth[month] ??= { month, revenue: 0, completed: 0, cancelled: 0, booked: 0 };
      byMonth[month].revenue   += r.revenue;
      byMonth[month].completed += r.completed;
      byMonth[month].cancelled += r.cancelled;
      byMonth[month].booked    += r.booked;
    }
    for (const m of Object.keys(byMonth)) {
      byMonth[m].revenue = Math.round(byMonth[m].revenue * 100) / 100;
    }
    return byMonth;
  };

  const currentByMonth = aggToMonths(currentDaily);
  const priorByMonth   = aggToMonths(priorDaily);

  const windowMonths = monthsBetween(dateStart.slice(0,7), dateEnd.slice(0,7));
  const priorMonths  = windowMonths.map(m => shiftYear(m, -1));

  const windowRows = windowMonths.map(m => currentByMonth[m] || { month: m, revenue: 0, completed: 0, cancelled: 0, booked: 0 });
  const hasPrior = Object.keys(priorByMonth).length > 0;
  const priorRows  = hasPrior ? priorMonths.map(m => priorByMonth[m] || null) : [];

  return { windowMonths, priorMonths, windowRows, priorRows, currentDaily, priorDaily };
}

function shiftDateYear(dateStr, delta) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return `${y + delta}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function monthsBetween(startMonth, endMonth) {
  const [sy, sm] = startMonth.split("-").map(Number);
  const [ey, em] = endMonth.split("-").map(Number);
  const out = [];
  let y = sy, m = sm;
  while (y < ey || (y === ey && m <= em)) {
    out.push(`${y}-${String(m).padStart(2,"0")}`);
    m += 1; if (m > 12) { m = 1; y += 1; }
  }
  return out;
}

// Format a YYYY-MM-DD date for display in the UI
function fmtDate(d) {
  if (!d) return "—";
  const [y, m, day] = d.split("-").map(Number);
  return `${MONTH_LABELS[m-1]} ${day}, ${y}`;
}

function Card({ title, subtitle, children }) {
  return (
    <div style={{ background:C.card, borderRadius:14, padding:"24px 22px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", marginBottom:20 }}>
      <div style={{ marginBottom:16 }}>
        <div className="chart-title">{title}</div>
        {subtitle && <div className="chart-subtitle">{subtitle}</div>}
      </div>
      {children}
    </div>
  );
}

function Legend2Layer() {
  return (
    <div style={{ display:"flex", gap:16, marginTop:10, justifyContent:"center", flexWrap:"wrap" }}>
      {[[C.green,"Booked & Completed"],[C.cancelled,"Booked but Cancelled"]].map(([col,lbl]) => (
        <div key={lbl} style={{ display:"flex", alignItems:"center", gap:6 }}>
          <div style={{ width:10, height:10, borderRadius:2, background:col }} />
          <span style={{ fontSize:11, color:C.muted }}>{lbl}</span>
        </div>
      ))}
    </div>
  );
}

function LoadingState() {
  return (
    <div style={{ background:C.bg, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ color:C.muted, fontSize:14 }}>Loading…</div>
    </div>
  );
}

function EmptyState({ message }) {
  return (
    <div style={{ background:C.bg, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:"40px 20px" }}>
      <div style={{ maxWidth:480, textAlign:"center" }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:28, color:C.text, marginBottom:12 }}>No data yet</div>
        <div style={{ fontSize:13, color:C.muted, lineHeight:1.6 }}>{message}</div>
      </div>
    </div>
  );
}
