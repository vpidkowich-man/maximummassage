// ── CSV PARSING ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.replace(/^"|"$/g,'').trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i] || '');
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function normalizeRow(r) {
  if (r.Q1 && typeof r.pain !== 'undefined') return r;
  const keys = Object.keys(r);
  return {
    Q1: r[keys[10]] || '',
    Q2: r[keys[11]] || '',
    pain: parseFloat(r[keys[12]]) || 0,
    Q3: r[keys[13]] || '',
    Q4: r[keys[14]] || '',
    source: r[keys[3]] ? 'paid' : 'organic',
    keyword: r[keys[7]] || '',
  };
}

// ── ANALYSIS ─────────────────────────────────────────────────────────────────
function analyze(rows) {
  const n = rows.length;
  if (n === 0) return null;
  const count = arr => arr.reduce((a,v)=>{ a[v]=(a[v]||0)+1; return a; }, {});
  const explode = key => rows.flatMap(r=>(r[key]||'').split(', ').map(s=>s.trim()).filter(Boolean));
  const q1 = count(rows.map(r=>r.Q1));
  const q4 = count(rows.map(r=>r.Q4));
  const conditions = count(explode('Q2'));
  const tried = count(explode('Q3'));
  const painAvg = (rows.reduce((s,r)=>s+r.pain,0)/n).toFixed(1);
  const highPain = rows.filter(r=>r.pain>=7).length;
  const midPain  = rows.filter(r=>r.pain>=4&&r.pain<=6).length;
  const lowPain  = rows.filter(r=>r.pain<=3).length;
  const relaxers = rows.filter(r=>r.Q1==='Relaxation and stress relief');
  const relaxWithPainBody = relaxers.filter(r=>r.Q2.includes('Chronic pain')||r.Q2.includes('Muscle tension')||r.Q2.includes('Recent injury'));
  const relaxHighPain = relaxers.filter(r=>r.pain>=7);
  const painMgmt = rows.filter(r=>r.Q1==='Pain management'||r.Q1==='Recovery from an injury');
  const veterans = rows.filter(r=>(r.Q3||'').split(', ').filter(s=>s.trim()).length >= 2);
  const firstTimers = rows.filter(r=>(r.Q3||'').includes("haven't tried anything yet"));
  const keywords = count(rows.map(r=>r.keyword).filter(Boolean));
  const paidCount = rows.filter(r=>r.source==='paid').length;
  const organicCount = rows.filter(r=>r.source==='organic').length;
  return { n, q1, q4, conditions, tried, painAvg, highPain, midPain, lowPain,
    relaxersN: relaxers.length, relaxWithPainBody: relaxWithPainBody.length,
    relaxHighPain: relaxHighPain.length,
    relaxAvgPain: (relaxers.reduce((s,r)=>s+r.pain,0)/relaxers.length).toFixed(1),
    painMgmtN: painMgmt.length,
    painMgmtAvgPain: (painMgmt.reduce((s,r)=>s+r.pain,0)/painMgmt.length).toFixed(1),
    veteransN: veterans.length,
    firstTimersN: firstTimers.length,
    paidCount, organicCount, keywords };
}

              <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:34,fontWeight:700,color:C.text,lineHeight:1.2,margin:"0 0 12px"}}>Who's Coming Through<br/>the Funnel?</h1>
              <p style={{fontSize:14,color:C.muted,lineHeight:1.75,margin:0}}>Maximum Massage Therapy · <strong style={{color:C.text}}>{n} respondents</strong> · Intent, pain profile & buyer segments</p>
            </div>
            {liveMode && (
              <div style={{background:C.greenPale,borderRadius:10,padding:"10px 14px",fontSize:11,color:C.green,fontWeight:600,textAlign:"right",flexShrink:0}}>
                <div style={{marginBottom:2}}>🟢 Live from Google Sheets</div>
                <div style={{color:C.muted,fontWeight:400}}>Updated {lastFetch}</div>
              </div>
            )}
          </div>
        </div>

        {/* HEADLINE FINDING */}
        <div style={{background:C.green,borderRadius:14,padding:"26px 26px",color:"#fff",marginBottom:32}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.goldLight,marginBottom:10}}>The headline finding</div>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,lineHeight:1.55,margin:"0 0 14px",fontWeight:600}}>
            {Math.round(relaxersN/n*100)}% say they want "relaxation" — but the average pain score across all respondents is {painAvg}/10.
          </p>
          <p style={{fontSize:13,color:"rgba(255,255,255,0.8)",margin:0,lineHeight:1.75}}>
            Of those relaxation-seekers: <strong style={{color:"#fff"}}>{relaxWithPainBody}</strong> report muscle tension or chronic pain as an active condition, and <strong style={{color:"#fff"}}>{relaxHighPain}</strong> score their pain at 7 or higher. The word "relaxation" is how people self-describe — the underlying need is often clinical.
          </p>
        </div>

        {/* KPIs */}
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:32}}>
          <KPI value={n} label="Respondents" sub="Unique quiz completions"/>
          <KPI value={`${painAvg}/10`} label="Avg pain score" sub="Across all — not just pain seekers" color={C.accentLight} accent={C.accent}/>
          <KPI value={`${Math.round(highPain/n*100)}%`} label="Pain score 7+" sub="Even among 'relaxation' seekers" color="#FAF0EB" accent={C.accent}/>
          <KPI value={`${Math.round(veteransN/n*100)}%`} label="Treatment veterans" sub="Already tried 2+ modalities" color={C.greenPale} accent={C.green}/>
        </div>

        {/* S1: SEGMENTS */}
        <div style={{marginBottom:32}}>
          <Step n="1">The Three Buyer Segments</Step>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <SegCard label="Disguised Pain Patient" pct={Math.round(relaxWithPainBody/n*100)} avgPain={relaxAvgPain}
              tagline="Said 'relaxation' but reports chronic pain or muscle tension"
              detail={`${relaxWithPainBody} of ${relaxersN} relaxation-seekers have underlying pain conditions. They self-minimise — the right copy meets them where they are, then elevates.`}
              color={C.accent} icon="🥸"/>
            <SegCard label="Explicit Pain Seeker" pct={Math.round(painMgmtN/n*100)} avgPain={painMgmtAvgPain}
              tagline="Came in specifically for pain management or injury recovery"
              detail="Highest avg pain of any group. Most are treatment veterans. They know what they need and are ready to commit — lowest friction to book."
              color={C.green} icon="🎯"/>
            <SegCard label="True Relaxation Client" pct={Math.round(trueRelaxN/n*100)} avgPain={trueRelaxAvgPain}
              tagline="Low pain, stress-driven, comfort-seeking"
              detail="Motivated by stress and anxiety, not physical symptoms. Most price-sensitive. Most likely to convert on the $49 intro offer."
              color={C.gold} icon="🧘"/>
          </div>
          <InsightBox title="What this means for the campaigns">
            The data tells us why the quiz and landing page have to do the heavy lifting that the keywords can't. Two-thirds of paid traffic is on generic terms ("massage near me", "massage in calgary") that carry no intent signal — meaning we can't sort these visitors into the right segment before they click. The quiz is doing that sorting after the click. The two-campaign split still makes sense for keywords that genuinely carry intent (clinical modifiers vs. "relaxation"), but for the bulk of traffic, the landing page has to be flexible enough to recognise and route a Disguised Pain Patient just as well as a True Relaxation Client.
          </InsightBox>
        </div>

        {/* S2: Q1 */}
        <div style={{marginBottom:32}}>
          <Step n="2">What People Say They Want (Q1)</Step>
          <Card>
            <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Primary reason for seeking massage</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:18}}>Self-reported — read alongside section 1</div>
            {q1Data.map(d=>(
              <HBar key={d.name} label={d.name} value={d.value} max={n}
                color={d.name.includes("Relaxation")?C.gold:d.name.includes("Pain")||d.name.includes("Injury")?C.green:C.empty}
                tag={d.name.includes("Relaxation")?`${Math.round(d.value/n*100)}%`:undefined}
                tagColor={d.name.includes("Relaxation")?C.gold:undefined}
              />
            ))}
            <InsightBox title="The self-report gap" color={C.gold}>
              {Math.round((q1["Relaxation and stress relief"]||0)/n*100)}% chose "relaxation" as their primary reason — but pain scores and conditions reveal a more complex picture. This is not dishonesty; it's how people frame their need before a clinical context validates it.
            </InsightBox>
          </Card>
        </div>

        {/* S3: CONDITIONS */}
        <div style={{marginBottom:32}}>
          <Step n="3">What Their Bodies Are Actually Dealing With (Q2)</Step>
          <Card>
            <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Active conditions reported (multi-select)</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:18}}>Total selections across {n} respondents</div>
            {condData.map(d=>(
              <HBar key={d.name} label={d.name} value={d.value} max={condData[0].value}
                color={d.name==="Stress and anxiety"?C.lavender:d.name==="Muscle tension"?C.green:d.name==="Chronic pain"?C.accent:d.name==="Recent injury"?C.gold:C.sky}
              />
            ))}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:16}}>
              <div style={{background:C.lavenderLight,borderRadius:10,padding:"14px 16px"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:C.lavender}}>{conditions["Stress and anxiety"]||0}</div>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>Stress & Anxiety</div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>Most common — crosses all segments</div>
              </div>
              <div style={{background:C.accentLight,borderRadius:10,padding:"14px 16px"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:C.accent}}>{(conditions["Muscle tension"]||0)+(conditions["Chronic pain"]||0)}</div>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>Physical Pain Conditions</div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>Muscle tension + chronic pain combined</div>
              </div>
            </div>
          </Card>
        </div>

        {/* S4: PAIN SCORES */}
        <div style={{marginBottom:32}}>
          <Step n="4">Pain Distribution</Step>
          <Card>
            <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Pain score on a scale of 0–10</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:18}}>How respondents rated their current discomfort</div>
            <ResponsiveContainer width="100%" height={175}>
              <BarChart data={painBuckets} margin={{top:8,right:8,left:-10,bottom:0}} barSize={64}>
                <CartesianGrid strokeDasharray="3 3" stroke="#EDE9E3" vertical={false}/>
                <XAxis dataKey="name" tick={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fill:C.muted}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fill:C.muted}} axisLine={false} tickLine={false}/>
                <Tooltip content={<TT/>} cursor={{fill:"rgba(0,0,0,0.03)"}}/>
                <Bar dataKey="value" radius={[6,6,0,0]}>
                  {painBuckets.map((d,i)=><Cell key={i} fill={d.fill}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
            <InsightBox title={`${Math.round(highPain/n*100)}% are in genuine pain`} color={C.accent}>
              Nearly half of all respondents score pain at 7 or above. This is not a spa audience — they want relief. Landing page copy should acknowledge this reality even for people who entered via a "relaxation" keyword.
            </InsightBox>
          </Card>
        </div>

        {/* S5: TREATMENT HISTORY */}
        <div style={{marginBottom:32}}>
          <Step n="5">What They've Already Tried (Q3)</Step>
          <Card>
            <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Previous treatments (multi-select)</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:18}}>This audience is not new to the healthcare system</div>
            {triedData.map(d=>(
              <HBar key={d.name} label={d.name} value={d.value} max={triedData[0].value}
                color={TRIED_COLORS[d.name]||C.empty}
              />
            ))}

            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:14,marginBottom:4}}>
              {triedData.map(d=>(
                <div key={d.name} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:10,height:10,borderRadius:2,background:TRIED_COLORS[d.name]||C.empty,flexShrink:0}}/>
                  <span style={{fontSize:11,color:C.muted}}>{d.name}</span>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
              <div style={{background:C.greenPale,borderRadius:10,padding:"14px 16px",flex:1,minWidth:140}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:C.green}}>{veteransN}</div>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>Treatment Veterans</div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>Tried 2+ modalities — {Math.round(veteransN/n*100)}% of respondents</div>
              </div>
              <div style={{background:C.skyLight,borderRadius:10,padding:"14px 16px",flex:1,minWidth:140}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:C.sky}}>{firstTimersN}</div>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>Haven't Tried Anything Yet</div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>Selected this as one of their options — lowest barrier to convert</div>
              </div>
            </div>

            <HighlightQuote>
              "The intro offer doesn't need to 'sell massage' — it needs to offer a risk-free first step with a practitioner who gets complex conditions."
            </HighlightQuote>

            <InsightBox color={C.green} title="These are solution shoppers, not comparison shoppers">
              {Math.round(veteransN/n*100)}% have already navigated physio, chiro, and medication. They arrived at your funnel because nothing else fully worked. Clinical credibility and empathy — not a general massage pitch — is what earns their trust.
            </InsightBox>
          </Card>
        </div>

        {/* S6: GOALS */}
        <div style={{marginBottom:32}}>
          <Step n="6">What They Actually Want to Achieve (Q4)</Step>
          <Card>
            <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Primary goal from treatment</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:18}}>Stated desired outcome — often more honest than Q1</div>
            {goalData.map(d=>(
              <HBar key={d.name} label={d.name} value={d.value} max={n}
                color={d.name==="Help me relax and de-stress"?C.gold:d.name==="Reduce pain and discomfort"?C.accent:d.name==="Improve mobility and flexibility"?C.green:d.name==="Reduce stress and anxiety"?C.lavender:C.teal}
              />
            ))}
            <InsightBox color={C.gold} title="The real demand hierarchy">
              "Help me relax and de-stress" is the #1 stated goal even among people with 7+ pain scores. Copy like "feel like yourself again" or "finally get relief" bridges both groups better than either "relaxation massage" or "therapeutic massage" alone.
            </InsightBox>
          </Card>
        </div>

        {/* S7: KEYWORDS */}
        {kwData.length > 0 && (
          <div style={{marginBottom:32}}>
            <Step n="7">Search Keywords Driving Completions</Step>
            <Card>
              <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Paid search terms from quiz completions</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:18}}>
                All {n} respondents arrived via Google Ads — gclid attribution captured on {paidCount} of {n} ({Math.round(paidCount/n*100)}%). The remaining {organicCount} are paid clicks where the click ID didn't get stored (a tracking gap, not organic traffic).
              </div>
              {kwData.map(d=>(
                <HBar key={d.name} label={d.name||"(not set)"} value={d.value} max={kwData[0].value}
                  color={d.name==="massage near me"?C.accent:C.green}
                  tag={d.name==="massage near me"?`${Math.round(d.value/paidCount*100)}% of attributed`:""}
                  tagColor={C.accent}
                />
              ))}

              <InsightBox color={C.accent} title='"massage near me" dominates — and the real share is even higher'>
                Of the keywords we can attribute, "massage near me" is already the top driver at {Math.round((keywords["massage near me"]||0)/paidCount*100)}%. Because the {organicCount} unattributed rows are also paid clicks (likely heavy on the same generic terms), the true share of generic-keyword traffic is even higher than what's shown here. People arriving from this keyword average a pain score of {mnmAvgPain}/10 — a clinical audience landing on a generic keyword. The page needs to acknowledge pain even when the search didn't.
              </InsightBox>
            </Card>
          </div>
        )}

        {/* FOOTER: WHAT WE'RE DOING */}
        <div style={{background:C.green,borderRadius:14,padding:"24px 24px",color:"#fff"}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.goldLight,marginBottom:10}}>What we're doing with this</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:14}}>
            {[
              ["Letting the quiz do the sorting",
               "Most paid traffic comes in on generic keywords with no intent signal, so we can't pre-sort visitors into segments. The quiz is doing that work after the click — surfacing real conditions, pain levels, and goals so we can route to the right therapist."],
              ["Splitting campaigns where intent is clear",
               "For keywords that do carry intent — clinical modifiers like 'deep tissue' or stated relaxation terms — the two-campaign split sends each visitor to the page that matches what they actually searched for."],
              ["Writing copy that bridges the gap",
               "Half the audience are treatment veterans who've already tried physio, chiro, and medication. The page copy speaks to that — clinical credibility and empathy for someone who's been let down before, not a generic massage pitch."],
              ["Using the intro offer as the entry",
               "The $49 first session is the risk-free door for all 3 segments — and especially for the veteran who needs a real reason to try one more thing."],
            ].map(([title,body])=>(
              <div key={title} style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"14px 14px"}}>
                <div style={{fontSize:13,fontWeight:700,color:C.goldLight,marginBottom:6}}>{title}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.75)",lineHeight:1.65}}>{body}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{marginTop:16,textAlign:"center",fontSize:12,color:C.muted,lineHeight:1.7}}>
          {liveMode ? `🟢 Live data from Google Sheets · Last loaded ${lastFetch}` : "Static data · Connect a Google Sheet to enable live updates"}<br/>
          Prepared by Smart Practitioner · Maximum Massage Therapy · Quiz Funnel Analysis
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
